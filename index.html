    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── 导航栏 / Nav ── */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 52px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      nav .logo {
        font-weight: 700;
        font-size: 16px;
        color: #64ffda;
        letter-spacing: -0.5px;
      }
      nav .logo span {
        color: rgba(255, 255, 255, 0.5);
        font-weight: 400;
      }
      nav .links {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      nav a {
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      nav a:hover {
        color: #64ffda;
      }
      nav a svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      /* ── 主区域 / Main ── */
      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 16px;
      }
      #cloud {
        width: 100%;
        max-width: 1100px;
        height: 580px;
        padding: 0 16px;
        box-sizing: border-box;
      }

      /* ── 页脚 / Footer ── */
      footer {
        text-align: center;
        padding: 20px 24px 28px;
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
      }
      footer a {
        color: rgba(255, 255, 255, 0.45);
        text-decoration: none;
        transition: color 0.2s;
      }
      footer a:hover {
        color: #64ffda;
      }
      footer .tagline {
        margin-bottom: 6px;
        color: rgba(255, 255, 255, 0.2);
      }
      /* ── 移动端响应式 / Mobile Responsive ── */
      @media (max-width: 768px) {
        nav {
          height: 44px;
          padding: 0 12px;
        }
        nav .logo {
          font-size: 14px;
        }
        nav .links {
          gap: 10px;
        }
        nav a {
          font-size: 12px;
        }
        main {
          padding: 16px 8px;
        }
        #cloud {
          height: 450px;
        }
        footer {
          padding: 14px 12px 20px;
          font-size: 11px;
        }
      }

      @media (max-width: 480px) {
        nav .logo span {
          display: none;
        }
        nav a span,
        nav a svg + * {
          display: none;
        }
        #cloud {
          height: 380px;
        }
      }
    </style>
